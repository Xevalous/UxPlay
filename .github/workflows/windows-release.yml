name: Windows Release Build

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BONJOUR_SDK_HOME: C:\Program Files\Bonjour SDK

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libplist
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-ninja
            p7zip
            zip

      - name: Install Bonjour SDK
        shell: pwsh
        run: |
          $installer = Join-Path $env:GITHUB_WORKSPACE 'third_party/bonjour/bonjoursdksetup.exe'
          $extractDir = Join-Path $env:RUNNER_TEMP 'bonjour-sdk'

          if (-not (Test-Path $installer)) { throw "Bonjour SDK installer not found at $installer" }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & 7z x $installer "-o$extractDir" | Out-Host

          $bonjourMsi = Join-Path $extractDir 'Bonjour64.msi'
          $bonjourSdkMsi = Join-Path $extractDir 'BonjourSDK64.msi'

          Start-Process msiexec -ArgumentList "/i `"$bonjourMsi`" /qn /L*v `"$env:RUNNER_TEMP\bonjour64.log`"" -NoNewWindow -Wait
          Start-Process msiexec -ArgumentList "/i `"$bonjourSdkMsi`" /qn /L*v `"$env:RUNNER_TEMP\bonjoursdk64.log`"" -NoNewWindow -Wait

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/ucrt64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage release files
        run: |
          mkdir -p dist
          cp build/uxplay.exe dist/
          cp README.md README.txt README.html LICENSE dist/
          cp uxplay.1 dist/ || true

      - name: Create release archive
        run: |
          zip -r "uxplay-windows-${{ github.event.release.tag_name }}.zip" dist

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: uxplay-windows-${{ github.event.release.tag_name }}.zip
