name: Sync Upstream Releases

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync missing upstream releases
        uses: actions/github-script@v7
        with:
          script: |
            const { execFileSync } = require('node:child_process');

            const upstream = { owner: 'FDH2', repo: 'UxPlay' };
            const target = { owner: context.repo.owner, repo: context.repo.repo };

            const [upstreamTags, targetTags, upstreamReleases, targetReleases] = await Promise.all([
              github.paginate(github.rest.repos.listTags, { ...upstream, per_page: 100 }),
              github.paginate(github.rest.repos.listTags, { ...target, per_page: 100 }),
              github.paginate(github.rest.repos.listReleases, { ...upstream, per_page: 100 }),
              github.paginate(github.rest.repos.listReleases, { ...target, per_page: 100 }),
            ]);

            const upstreamTagByName = new Map(upstreamTags.map((tag) => [tag.name, tag.commit.sha]));
            const targetTagNames = new Set(targetTags.map((tag) => tag.name));
            const targetReleaseNames = new Set(targetReleases.map((release) => release.tag_name));

            const missingReleases = upstreamReleases
              .filter((release) => !targetReleaseNames.has(release.tag_name))
              .sort((a, b) => new Date(a.published_at || a.created_at) - new Date(b.published_at || b.created_at));

            if (missingReleases.length === 0) {
              core.info('No upstream releases to sync.');
              return;
            }

            for (const release of missingReleases) {
              const tagName = release.tag_name;
              const commitSha = upstreamTagByName.get(tagName);

              if (!commitSha) {
                core.warning(`Skipping ${tagName}: upstream tag SHA not found.`);
                continue;
              }

              if (!targetTagNames.has(tagName)) {
                core.info(`Creating tag ${tagName} at ${commitSha}`);
                execFileSync('git', ['tag', tagName, commitSha], { stdio: 'inherit' });
                execFileSync('git', ['push', 'origin', `refs/tags/${tagName}`], { stdio: 'inherit' });
              }

              const existingRelease = targetReleases.find((item) => item.tag_name === tagName);
              if (existingRelease) {
                core.info(`Release ${tagName} already exists in fork, skipping.`);
                continue;
              }

              const notes = [
                release.body?.trim() || 'Synced from upstream release.',
                '',
                `Upstream release: https://github.com/${upstream.owner}/${upstream.repo}/releases/tag/${tagName}`,
              ].join('\n');

              core.info(`Creating release ${tagName} in fork.`);
              await github.rest.repos.createRelease({
                owner: target.owner,
                repo: target.repo,
                tag_name: tagName,
                target_commitish: commitSha,
                name: release.name || tagName,
                body: notes,
                draft: false,
                prerelease: release.prerelease,
                generate_release_notes: false,
              });
            }
